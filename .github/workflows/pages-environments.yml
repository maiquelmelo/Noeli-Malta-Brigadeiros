name: Publicar ambientes no GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Obter versão de produção
        uses: actions/checkout@v7
        with:
          ref: main
          path: dist
          fetch-depth: 1
          persist-credentials: false

      - name: Obter versão de homologação
        uses: actions/checkout@v7
        with:
          ref: homologacao
          path: dist/homologacao
          fetch-depth: 1
          persist-credentials: false

      - name: Obter versão de desenvolvimento
        uses: actions/checkout@v7
        with:
          ref: desenvolvimento
          path: dist/desenvolvimento
          fetch-depth: 1
          persist-credentials: false

      - name: Remover metadados e arquivos internos
        run: |
          find dist -type d -name .git -prune -exec rm -rf {} +
          find dist -type d -name .github -prune -exec rm -rf {} +
          find dist -type f \( -name '*.nmbackup' -o -name 'backup*.json' -o -name '.env*' \) -delete

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Preparar artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
